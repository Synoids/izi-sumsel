name: Keep Supabase Alive

on:
  schedule:
    # Berjalan setiap hari pada jam 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  workflow_dispatch: # Mengizinkan untuk dijalankan secara manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase Database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Error: DATABASE_URL secret belum diatur di pengaturan repositori GitHub."
            exit 1
          fi
          # Menghapus parameter query seperti ?pgbouncer=true karena psql tidak mendukungnya
          CLEAN_URL="${DATABASE_URL%%\?*}"
          
          # Melakukan query ke sistem PostgreSQL agar tidak error jika tabel spesifik tidak ada
          # Aktivitas ini cukup untuk dicatat oleh Supabase
          psql "$CLEAN_URL" -c "
            SELECT 'Ping berhasil' as status, NOW() as waktu;
            SELECT count(*) FROM pg_stat_user_tables;
          "

      - name: Keep GitHub Actions Alive
        run: |
          LAST_COMMIT_DATE=$(git log -1 --format=%ct)
          CURRENT_DATE=$(date +%s)
          DAYS_SINCE_COMMIT=$(( (CURRENT_DATE - LAST_COMMIT_DATE) / 86400 ))
          
          if [ "$DAYS_SINCE_COMMIT" -gt 50 ]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git commit --allow-empty -m "chore: keep github actions alive"
            git push
          else
            echo "Last commit was $DAYS_SINCE_COMMIT days ago. No keepalive commit needed."
          fi
